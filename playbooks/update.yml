---
- name: Update System Playbook
  hosts: localhost
  become: "{{ ansible_os_family != 'Darwin' }}"
  
  tasks:
    - name: Update all packages (Debian/Ubuntu)
      apt:
        upgrade: dist
        update_cache: yes
        autoremove: yes
        autoclean: yes
      when: ansible_os_family == 'Debian'

    - name: Update all packages (RedHat/Fedora)
      dnf:
        name: '*'
        state: latest
        update_cache: yes
      when: ansible_os_family == 'RedHat'

    - name: Update all packages (Arch)
      pacman:
        update_cache: yes
        upgrade: yes
      when: ansible_os_family == 'Archlinux'

    - name: Update Homebrew packages (macOS)
      homebrew:
        update_homebrew: yes
        upgrade_all: yes
      become: false
      when: ansible_os_family == 'Darwin'

    - name: Update global npm packages
      shell: npm update -g
      become: false
      ignore_errors: yes

    - name: Update Rust
      shell: rustup update
      become: false
      ignore_errors: yes

    - name: Clean package manager cache (Debian/Ubuntu)
      apt:
        autoclean: yes
        autoremove: yes
      when: ansible_os_family == 'Debian'

    - name: Display update summary
      debug:
        msg:
          - "System update completed!"
          - "You may need to restart some services or reboot for kernel updates."