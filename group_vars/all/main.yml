---
# User configuration
user: "{{ lookup('env', 'USER') }}"
home_dir: "{{ lookup('env', 'HOME') }}"

# User-specific shell configuration
user_shell_overrides:
  oriol: "/usr/bin/fish"

# Dotfiles configuration
dotfiles_repo: "https://github.com/oriolj/dotfiles.git"
dotfiles_path: "{{ home_dir }}/git/oriolj/dotfiles"
dotfiles_branch: "master"
# Run sync-dotfiles.sh restore after cloning to deploy configs into ~/.
# The script uses rsync --delete on tracked directories — review with
# `./sync-dotfiles.sh restore --dry-run` first if the host already has configs.
apply_dotfiles_restore: true
# The oriolj/dotfiles repo ships its own tmux.conf, vimrc, etc., so skip
# the role's default Jinja templates that would otherwise overwrite them.
deploy_default_configs: false

# Shell configuration
default_shell: "/usr/bin/fish"

# Development configuration
install_development_tools: true
install_docker: true
install_languages: true

# Git configuration
git_user_name: "Oriol Jimenez"
git_user_email: "oriolj@gmail.com"

# Programming languages to install
languages:
  - python
  - nodejs
  - go
  - rust

# Global NPM packages to install
npm_global_packages:
  - "@google/gemini-cli"
  - "@anthropic-ai/claude-code"

# SSH configuration
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_pubkey_authentication: "yes"
generate_ssh_key: true
ssh_key_type: "ed25519"

# SSH Authorized Keys
# Add new SSH public keys here to distribute them to all hosts
ssh_authorized_keys:
  - key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAvzwS3jm0Qa9ICBq8aAeKQdnYpAh1rrErtUGxDXYn7E"
    comment: "Fold 7"
    state: present
  # Add more keys here as needed:
  # - key: "ssh-rsa AAAAB3NzaC1yc2EA..."
  #   comment: "Work laptop"
  #   state: present

# Tailscale configuration
install_tailscale: true
use_tailscale_install_script: true  # Use official install script (curl -fsSL https://tailscale.com/install.sh | sh)
tailscale_auth_key: ""  # Set this in vault.yml

# Syncthing configuration
install_syncthing: true
syncthing_gui_address: "127.0.0.1:8384"
syncthing_gui_enabled: true

# System configuration
enable_firewall: true
automatic_updates: true
timezone: "Europe/Madrid"

# Package installation
update_cache_valid_time: 3600  # 1 hour

# AUR packages for Arch Linux (installed via yay)
aur_packages:
  - visual-studio-code-bin
  - cursor-bin
  - spotify
  - slack-desktop
  - zoom
  - brave-bin
  - ticktick
  - obsidian
  - localsend-bin

# Cross-platform package lists and `package_map` live in `packages.yml`,
# which is loaded after this file and is the source of truth for those keys.