---
# LocalSend on Fedora: the dregetas/localsend COPR has no Fedora 44 build
# (empty repo), so install from Flathub instead — version-independent and
# not tied to a COPR maintainer keeping up with new Fedora releases.
- name: Install flatpak (Fedora)
  ansible.builtin.dnf:
    name: flatpak
    state: present
  become: yes

- name: Add Flathub remote (Fedora)
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    method: system
    state: present
  become: yes

- name: Install LocalSend from Flathub (Fedora)
  community.general.flatpak:
    name: org.localsend.localsend_app
    remote: flathub
    method: system
    state: present
  become: yes
