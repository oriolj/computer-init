---
- name: Install Fish shell
  package:
    name: fish
    state: present
  become: "{{ ansible_os_family != 'Darwin' }}"

- name: Install fzf
  package:
    name: fzf
    state: present
  become: "{{ ansible_os_family != 'Darwin' }}"
  ignore_errors: yes

- name: Install autojump from AUR (Arch)
  shell: yay -S --noconfirm autojump
  become: false
  when: ansible_os_family == 'Archlinux'
  register: autojump_install
  changed_when: "'Installing' in autojump_install.stdout"
  ignore_errors: yes

- name: Install autojump (non-Arch)
  package:
    name: autojump
    state: present
  become: yes
  when: ansible_os_family != 'Archlinux'
  ignore_errors: yes

- name: Deploy shell aliases
  template:
    src: aliases.j2
    dest: "{{ home_dir }}/.aliases"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0644'
  become: false

- name: Deploy shell functions
  template:
    src: functions.j2
    dest: "{{ home_dir }}/.functions"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0644'
  become: false

- name: Check current shell
  shell: echo $SHELL
  register: current_shell
  changed_when: false
  become: false

- name: Determine shell to use
  set_fact:
    user_shell: "{{ user_shell_overrides[user] | default(default_shell) }}"

- name: Set user's default shell
  user:
    name: "{{ user }}"
    shell: "{{ user_shell }}"
  become: yes
  when: current_shell.stdout != user_shell