---
- name: Ensure fish conf.d directory exists
  file:
    path: "{{ home_dir }}/.config/fish/conf.d"
    state: directory
    mode: '0755'
  become: false

- name: Install Python development tools
  package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
    state: present
  become: "{{ ansible_os_family != 'Darwin' }}"
  when: "'python' in languages"

- name: Install Node.js and npm
  include_tasks: nodejs.yml
  when: "'nodejs' in languages"

- name: Install Go
  include_tasks: golang.yml
  when: "'go' in languages"

- name: Install Rust
  include_tasks: rust.yml
  when: "'rust' in languages"

- name: Install asdf version manager
  git:
    repo: https://github.com/asdf-vm/asdf.git
    dest: "{{ home_dir }}/.asdf"
    version: v0.13.1
  become: false
  when: use_asdf | default(true)

- name: Add asdf to fish
  blockinfile:
    path: "{{ home_dir }}/.config/fish/conf.d/asdf.fish"
    create: yes
    mode: '0644'
    block: |
      # asdf version manager (sets up PATH, shims and completions)
      source "$HOME/.asdf/asdf.fish"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - asdf"
  become: false
  when: use_asdf | default(true)