---
- name: Check if Rust is installed
  stat:
    path: "{{ home_dir }}/.cargo/bin/rustc"
  register: rust_installed
  become: false

- name: Download Rust installer
  get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup.sh
    mode: '0755'
  when: not rust_installed.stat.exists
  become: false

- name: Install Rust
  shell: /tmp/rustup.sh -y --no-modify-path
  when: not rust_installed.stat.exists
  become: false

- name: Add Rust to fish PATH
  blockinfile:
    path: "{{ home_dir }}/.config/fish/conf.d/rust.fish"
    create: yes
    mode: '0644'
    block: |
      # Rust programming language
      if test -f "$HOME/.cargo/env.fish"
          source "$HOME/.cargo/env.fish"
      else
          fish_add_path "$HOME/.cargo/bin"
      end
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Rust"
  become: false

- name: Install common Rust tools
  shell: |
    source {{ home_dir }}/.cargo/env
    cargo install {{ item }}
  loop:
    - cargo-edit
    - cargo-watch
    - cargo-audit
  become: false
  when: rust_installed.stat.exists or not rust_installed.stat.exists