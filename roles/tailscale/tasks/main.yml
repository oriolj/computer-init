---
- name: Check if Tailscale is already installed
  command: which tailscale
  register: tailscale_check
  changed_when: false
  failed_when: false

- name: Install Tailscale using official install script
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  when: 
    - tailscale_check.rc != 0
    - use_tailscale_install_script | default(true)

- name: Install Tailscale (Debian/Ubuntu)
  include_tasks: install-debian.yml
  when: 
    - ansible_os_family == 'Debian'
    - tailscale_check.rc != 0
    - not (use_tailscale_install_script | default(true))

- name: Install Tailscale (RedHat/Fedora)
  include_tasks: install-redhat.yml
  when: 
    - ansible_os_family == 'RedHat'
    - tailscale_check.rc != 0
    - not (use_tailscale_install_script | default(true))

- name: Install Tailscale (Arch)
  include_tasks: install-arch.yml
  when: 
    - ansible_os_family == 'Archlinux'
    - tailscale_check.rc != 0
    - not (use_tailscale_install_script | default(true))

- name: Install Tailscale (macOS)
  include_tasks: install-macos.yml
  when: 
    - ansible_os_family == 'Darwin'
    - tailscale_check.rc != 0
    - not (use_tailscale_install_script | default(true))

- name: Silence interactive Tailscale GPG prompt (RedHat/Fedora)
  # The official install script writes /etc/yum.repos.d/tailscale.repo with
  # repo_gpgcheck=1, so dnf prompts to import the metadata-signing key on every
  # refresh (the rpm-keyring import only covers package gpgcheck, not repo
  # metadata). Import the key and turn repo_gpgcheck off — package signatures
  # (gpgcheck=1) stay enforced; this matches the role's own yum_repository,
  # which never set repo_gpgcheck.
  when: ansible_os_family == 'RedHat'
  block:
    - name: Import Tailscale repository GPG key (RedHat/Fedora)
      ansible.builtin.rpm_key:
        key: https://pkgs.tailscale.com/stable/fedora/repo.gpg
        state: present
      become: yes

    - name: Check for the Tailscale repo file (RedHat/Fedora)
      ansible.builtin.stat:
        path: /etc/yum.repos.d/tailscale.repo
      register: tailscale_repo_file

    - name: Disable repo_gpgcheck on the Tailscale repo (RedHat/Fedora)
      ansible.builtin.ini_file:
        path: /etc/yum.repos.d/tailscale.repo
        section: tailscale-stable
        option: repo_gpgcheck
        value: '0'
        no_extra_spaces: yes
      become: yes
      when: tailscale_repo_file.stat.exists

- name: Start and enable Tailscale service
  systemd:
    name: tailscaled
    state: started
    enabled: yes
  become: yes
  when:
    - ansible_os_family != 'Darwin'
    - ansible_service_mgr == 'systemd'

- name: Check Tailscale status
  command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Authenticate Tailscale
  command: tailscale up --authkey="{{ tailscale_auth_key | default(vault_tailscale_auth_key) }}"
  when:
    - tailscale_auth_key is defined or vault_tailscale_auth_key is defined
    - tailscale_status.rc != 0 or "Logged out" in tailscale_status.stdout
  no_log: true

- name: Configure Tailscale options
  command: tailscale set {{ item }}
  loop:
    - "--accept-routes={{ tailscale_accept_routes | default('true') }}"
    - "--accept-dns={{ tailscale_accept_dns | default('true') }}"
  when: tailscale_status.rc == 0
  changed_when: false